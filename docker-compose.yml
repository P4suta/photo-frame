services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
      # The Dockerfile is multi-stage (chef-base / planner / cacher /
      # builder / runtime / dev). docker-compose builds only the `dev`
      # stage here; the `runtime` stage (slim CLI distribution image) is
      # built explicitly via `just docker-build-release`.
      target: dev
      args:
        # `UID` is a readonly bash variable on the host (`UID=$(id -u) docker
        # compose build` fails with "UID: readonly variable"). Renamed to
        # HOST_UID / HOST_GID — these are picked up from the environment
        # if exported, otherwise fall back to 1000 (standard Linux user).
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    image: photo-frame-dev:latest
    container_name: photo-frame-dev
    # Run as the matching UID so files created by the container don't
    # appear root-owned to the host. The Dockerfile's `USER dev` switch
    # provides the right UID inside the image but compose's explicit user
    # override here also covers `docker compose run` invocations.
    user: '${HOST_UID:-1000}:${HOST_GID:-1000}'
    volumes:
      - .:/workspace:cached
      # Per-volume named caches survive across container restarts so cargo
      # doesn't re-fetch the registry every session. Permissions on these
      # volumes are initialised in the Dockerfile's USER dev step (mkdir +
      # chown), but `docker compose up` recreates the mount with mode 755
      # owned by the volume's first writer — for the dev user that's fine
      # because the image already created /home/dev/.cargo with the right
      # ownership.
      - cargo-registry:/home/dev/.cargo/registry
      - cargo-git:/home/dev/.cargo/git
      - target-cache:/workspace/target
      - node-cache:/workspace/crates/photo-frame-wasm/www/node_modules
    working_dir: /workspace
    # Docker copies the host's `/etc/resolv.conf` into the container.
    # On hosts running systemd-resolved (the default on Ubuntu /
    # Debian desktops, etc.) that file points to `127.0.0.53`, which
    # is only reachable from the host's loopback — the container's
    # network namespace can't see it, so DNS resolution fails for
    # `bun install`, `cargo fetch`, and the like. Pinning explicit
    # public resolvers here sidesteps the systemd-resolved trap.
    dns:
      - 1.1.1.1
      - 8.8.8.8
    ports:
      - '5173:5173' # Vite dev server
    tty: true
    stdin_open: true
    command: bash

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
  node-cache:
