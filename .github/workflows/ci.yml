name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: fmt / lint / test / wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install just, taplo, typos, wasm-pack, cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: just,taplo-cli,typos-cli,wasm-pack,cargo-deny

      - name: Install biome (via bun, npm-compatible)
        run: bun install -g @biomejs/biome

      - name: Run full CI suite
        run: just ci
