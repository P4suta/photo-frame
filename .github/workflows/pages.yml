name: pages

# Deploy the Vite/WASM bundle to GitHub Pages.
#
# Phase 2 reuses ci.yml's web-build artefact instead of rebuilding from
# scratch — the dist/ tarball is already shaped for publishing (Geist
# attribution copied in by the CI job). pages.yml chains off ci.yml's
# successful completion via workflow_run so the deploy fires once per
# merged main build.

on:
  workflow_run:
    workflows: ['ci']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: 'ci.yml run ID to reuse the web-dist artefact from'
        required: true

permissions:
  contents: read
  pages: write
  id-token: write
  actions: read  # for downloading artefacts from the ci.yml run

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  upload:
    name: upload Pages artefact (from ci.yml dist)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download web-dist artefact from ci.yml run
        uses: actions/download-artifact@v4
        with:
          name: web-dist-${{ github.event.workflow_run.id || github.event.inputs.ci_run_id }}
          path: dist/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id || github.event.inputs.ci_run_id }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: upload
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
