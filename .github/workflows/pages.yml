name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: taiki-e/install-action@v2
        with:
          tool: just,wasm-pack

      - name: Build WASM package
        run: just wasm-build

      - name: Build web bundle
        working-directory: crates/photo-frame-wasm/www
        run: |
          bun install --frozen-lockfile
          bun run build
          # Ship the bundled font's full upstream attribution alongside the WASM
          # output, exactly as Vercel published it.
          mkdir -p dist/fonts/Geist
          cp ../../photo-frame-core/assets/fonts/Geist/LICENSE.txt        dist/fonts/Geist/
          cp ../../photo-frame-core/assets/fonts/Geist/OFL.txt            dist/fonts/Geist/
          cp ../../photo-frame-core/assets/fonts/Geist/AUTHORS.txt        dist/fonts/Geist/
          cp ../../photo-frame-core/assets/fonts/Geist/CONTRIBUTORS.txt   dist/fonts/Geist/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: crates/photo-frame-wasm/www/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
