# mise tool version pins.
# Docs: https://mise.jdx.dev/
#
# Single source of truth for tool versions across host + container +
# CI. `mise install` in the project root fetches and sets up each
# tool below; Renovate's regexManager bumps the versions on schedule.
#
# Why mise (not asdf, not vendored binaries):
#   - one-shot bootstrap on any Linux/macOS host
#   - fast (Rust-based shims)
#   - already used by the project author elsewhere
#
# Rust / cargo themselves come from rustup pin in the Dockerfile
# (RUST_VERSION ARG); mise focuses on the auxiliary toolchain.

[tools]
# Tools the Dockerfile already installs via cargo-binstall — listed
# here so a contributor working on the host (no Docker) can run
# `mise install` and get the same versions. The Dockerfile remains
# the source of truth for what's *in the container*; mise keeps host
# parity reproducible.
hyperfine = "latest"
jq        = "latest"
# taplo formats / lints every Cargo.toml + every other TOML in the
# tree (`just fmt-check` runs `taplo fmt --check`). Listed here so
# `mise install` on a fresh host pulls the same version CI uses —
# without it, contributors run `cargo fmt + biome format` locally,
# pass `just fmt-check` if taplo silently no-ops, and only learn
# about a TOML drift when CI's `format / lint` job rejects the PR.
taplo = "latest"

# Runtime profiling: samply records perf traces and opens them in the
# Firefox Profiler UI (works locally, no GPU dependency, no
# system-wide perf permissions needed once unprivileged perf is
# enabled). `just profile-pipeline FIXTURE` drives it.
"cargo:samply" = "latest"

# tracing-flame collects span timings; inferno renders the resulting
# `.folded` file into an SVG flamegraph. Together they give us the
# span-level latency tree that `tracing` already emits in
# pipeline.rs / render.rs / decode/lib.rs / encode/lib.rs but had
# no consumer for.
"cargo:inferno" = "latest"

# iai-callgrind's runner binary. The library crate
# `iai-callgrind` (added to photo-frame-bench dev-dependencies)
# expects this binary on $PATH at the same version. Valgrind
# itself is a system-package dependency — `apt install valgrind`
# on Debian/Ubuntu, installed by Dockerfile for the dev image.
"cargo:iai-callgrind-runner" = "latest"
