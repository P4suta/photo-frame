# bacon — background cargo command runner for fast inner-loop feedback.
# Docs: https://dystroy.org/bacon/
#
# Pick a job from `just dev` (which runs `bacon clippy-all` by default)
# or type a key to switch:
#   t  test
#   c  clippy-all
#   r  run
#   n  next failing test only (after `t`)

default_job = "clippy-all"

[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = [
    "cargo", "clippy",
    "--workspace", "--all-targets",
    "--color", "always",
    "--", "-W", "clippy::all",
]
need_stdout = false

[jobs.clippy-all]
command = [
    "cargo", "clippy",
    "--workspace", "--all-targets",
    "--color", "always",
    "--", "-D", "warnings",
]
need_stdout = false

[jobs.test]
command = [
    "cargo", "nextest", "run",
    "--workspace", "--all-targets",
    "--color", "always",
    "--no-fail-fast",
]
need_stdout = true

[jobs.doc-tests]
command = ["cargo", "test", "--workspace", "--doc", "--color", "always"]
need_stdout = true

[jobs.run]
command = [
    "cargo", "run", "-p", "photo-frame-cli", "--",
    "--help",
]
need_stdout = true
allow_warnings = true

[keybindings]
t = "job:test"
c = "job:clippy-all"
d = "job:doc-tests"
r = "job:run"
n = "job:test"  # 'n' alias for test (re-run failing)
