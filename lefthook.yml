# Lefthook hooks delegate to `just` recipes so there is exactly one source of truth
# for what "fmt / lint / test" means across local, hook, and CI surfaces.

pre-commit:
  parallel: true
  commands:
    # ── Signing policy ───────────────────────────────────────────────
    # Refuse to record a commit unless commit.gpgsign + user.signingkey
    # are properly configured. Project policy is that *every* commit is
    # signed (GitHub's repository ruleset enforces the same — without
    # this hook a contributor would push, get refused, and only then
    # learn). Runs before any format / lint commands so a misconfigured
    # environment fails fast.
    signing-config:
      priority: 1
      run: scripts/check-signing.sh config

    fmt-rust:
      glob: '*.rs'
      run: cargo fmt --all -- --check
    fmt-ts:
      glob: '*.{ts,tsx,js,jsx,json,jsonc}'
      run: biome format {staged_files}
    fmt-toml:
      glob: '*.toml'
      run: taplo fmt --check {staged_files}
    typos:
      # `--no-progress` was removed in typos-cli ~1.40; `--quiet` is
      # the current way to suppress the progress bar that breaks
      # lefthook's structured output rendering.
      run: typos --quiet
    lint-ts:
      glob: '*.{ts,tsx,js,jsx}'
      run: biome lint {staged_files}

pre-push:
  parallel: true
  commands:
    # ── Signing verification ─────────────────────────────────────────
    # The pre-commit hook above stops *new* unsigned commits from being
    # created locally. This step is the gate that stops historically-
    # unsigned commits (cherry-picks, rebases from elsewhere, imports)
    # from ever reaching the remote. Walks the git push stdin protocol
    # and refuses if `%G?` is anything other than `G` for any commit
    # in the range being pushed.
    #
    # Reads pre-push stdin via lefthook's stdin-passthrough (interactive=true).
    signing-verify:
      priority: 1
      interactive: true
      run: scripts/check-signing.sh pre-push

    clippy:
      run: just lint-rust
    deps:
      run: just lint-deps
    test:
      run: just test
    wasm-build:
      run: just wasm-build
