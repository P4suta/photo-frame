# Lefthook hooks delegate to `just` recipes so there is exactly one source of truth
# for what "fmt / lint / test" means across local, hook, and CI surfaces.

pre-commit:
  parallel: true
  commands:
    # ── Signing policy ───────────────────────────────────────────────
    # Refuse to record a commit unless commit.gpgsign + user.signingkey
    # are properly configured. Project policy is that *every* commit is
    # signed (GitHub's repository ruleset enforces the same — without
    # this hook a contributor would push, get refused, and only then
    # learn). Runs before any format / lint commands so a misconfigured
    # environment fails fast.
    signing-config:
      priority: 1
      run: scripts/check-signing.sh config

    fmt-rust:
      glob: '*.rs'
      run: cargo fmt --all -- --check
    # biome (formatter + linter) lives only inside the dev container —
    # the host has no global biome and the web package.json doesn't
    # depend on @biomejs/biome either. Route the hook through
    # `docker compose exec` so a host-side `git commit` still hits
    # the same biome the container/CI uses. Requires the dev service
    # to be running: `docker compose up -d dev`.
    fmt-ts:
      glob: '*.{ts,tsx,js,jsx,json,jsonc,css}'
      run: docker compose exec -T dev biome format {staged_files}
    fmt-toml:
      glob: '*.toml'
      run: taplo fmt --check {staged_files}
    typos:
      # `--no-progress` was removed in typos-cli ~1.40; `--quiet` is
      # the current way to suppress the progress bar that breaks
      # lefthook's structured output rendering.
      #
      # `--write-changes` makes typos auto-fix in place — typos has
      # high precision and the built-in dictionary won't touch
      # ambiguous words, so the autofix is safe to run unattended.
      # `stage_fixed: true` then re-stages the corrected files so
      # the commit includes the fixes instead of failing on them.
      run: typos --quiet --write-changes {staged_files}
      stage_fixed: true
    lint-ts:
      glob: '*.{ts,tsx,js,jsx,css}'
      run: docker compose exec -T dev biome lint {staged_files}
    # Panda generates `styled-system/` from `panda.config.ts` and the
    # config-side modules under `panda/`. Regenerate when those change
    # so the TS typecheck below works against fresh token / recipe
    # types. The output is gitignored so nothing gets staged; we just
    # make sure the local working copy stays consistent.
    panda-codegen:
      glob: 'crates/photo-frame-wasm/www/{panda.config.ts,panda/**}'
      run: just panda-codegen

pre-push:
  parallel: true
  commands:
    # ── Signing verification ─────────────────────────────────────────
    # The pre-commit hook above stops *new* unsigned commits from being
    # created locally. This step is the gate that stops historically-
    # unsigned commits (cherry-picks, rebases from elsewhere, imports)
    # from ever reaching the remote. Walks the git push stdin protocol
    # and refuses if `%G?` is anything other than `G` for any commit
    # in the range being pushed.
    #
    # Reads pre-push stdin via lefthook's stdin-passthrough (interactive=true).
    signing-verify:
      priority: 1
      interactive: true
      run: scripts/check-signing.sh pre-push

    clippy:
      run: just lint-rust
    deps:
      run: just lint-deps
    test:
      run: just test
    wasm-build:
      run: just wasm-build
    # The Vite/Panda chain catches token typos and recipe misuse at
    # build time. Without this gate they'd only surface in CI, after
    # the push has already cost a round-trip.
    web-build:
      run: just web-build
    # Vitest covers the TS-side logic (pure functions, state
    # machines, component behaviour). Pairs with `test` (Rust)
    # so both sides of the WASM boundary have regression nets.
    web-test:
      run: just web-test
