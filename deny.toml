# cargo-deny configuration.
#
# This file is the contractual enforcement of the "Cargo dep tree must be
# 100% Pure Rust" rule documented in the README. If a new transitive
# dependency drags in *any* of the listed build-time crates, cargo-deny
# fails in CI before the change can land. The list is small on purpose —
# these are the canonical "this crate compiles C source or invokes a
# system library finder" gatekeepers, and dependencies of *those* are what
# really pull a C toolchain into the Rust build.
#
# Adding a new entry here is a one-way ratchet — discuss before relaxing.

[graph]
all-features        = false
no-default-features = false

[bans]
multiple-versions = "allow" # the dep graph naturally has dupes; not our fight
wildcards = "allow"
highlight = "all"
deny = [
    { name = "cc" },
    { name = "cc-rs" },
    { name = "bindgen" },
    { name = "pkg-config" },
    { name = "vcpkg" },
    { name = "cmake" },
    { name = "autotools" },
    { name = "meson" },
]
# Note on the opt-in `heif` cargo feature: enabling it on
# `photo-frame-decode` pulls in `libheif-rs` → `libheif-sys`, which in
# turn drags `pkg-config` / `vcpkg` into the build graph. That breaks
# the C-purity contract — *intentionally*. The trade is explicit at the
# feature flag.
#
# cargo-deny's `skip-tree` is `multiple-versions`-only, so it cannot
# bypass `deny` on a per-subtree basis. We therefore do **not** run
# `cargo deny check bans --all-features`; the contract applies only to
# the default-features build (`just lint-deps`). A heif-aware lint job
# would have to override the `deny` list, not whitelist a subtree.

[licenses]
# Permissive OSI-approved licenses only. Project itself is dual MIT /
# Apache-2.0; the dep tree is expected to be compatible with that
# distribution choice. Adding a license here is a one-way ratchet —
# verify the obligations before extending.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
    "OFL-1.1",     # Geist Sans bundled with photo-frame-frame
    "MPL-2.0",     # weak-copyleft (file-level), considered compatible
]
unused-allowed-license = "allow"
confidence-threshold   = 0.93

[advisories]
# Advisories are a separate concern from C-purity; we let `cargo deny check
# advisories` warn but gate CI only on `bans`.
yanked       = "warn"
unmaintained = "workspace"
ignore       = []

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
